<svg width="100%" viewBox="0 0 680 311" role="img" xmlns="http://www.w3.org/2000/svg">
<title>配布相手とSalesforceの将来アクセス図</title>
<desc>配布相手はClaude基盤を介す経路と直接操作する経路の複線でSalesforceにアクセスする。Salesforceが正本で、内部にAgentforceという将来の選択肢を持つ。</desc>
<style>
.cont{fill:none;stroke:#888780;stroke-width:0.5;stroke-dasharray:5 3;}
.label{font:400 14px sans-serif;fill:#2C2C2A;}
.title{font:500 14px sans-serif;}
.sub{font:400 12px sans-serif;}
.arr{stroke:#5F5E5A;stroke-width:1.5;fill:none;}
.b-coral{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5;}
.b-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5;}
.b-gray{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5;}
.b-blue{fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5;}
.t-coral{fill:#4A1B0C;}.s-coral{fill:#993C1D;}
.t-purple{fill:#26215C;}.s-purple{fill:#534AB7;}
.t-gray{fill:#2C2C2A;}.s-gray{fill:#5F5E5A;}
.t-blue{fill:#042C53;}.s-blue{fill:#185FA5;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="40" y="95" width="170" height="185" rx="10" class="cont"/>
<text class="label" x="52" y="115">配布相手</text>
<rect x="56" y="128" width="138" height="58" rx="6" class="b-coral"/>
<text class="title t-coral" x="125" y="153" text-anchor="middle">内勤者</text>
<text class="sub s-coral" x="125" y="171" text-anchor="middle">Claude Desktop主</text>
<rect x="56" y="200" width="138" height="58" rx="6" class="b-coral"/>
<text class="title t-coral" x="125" y="225" text-anchor="middle">外勤者・営業</text>
<text class="sub s-coral" x="125" y="243" text-anchor="middle">Mobile主・音声入力</text>

<rect x="270" y="104" width="230" height="86" rx="6" class="b-purple"/>
<text class="title t-purple" x="385" y="130" text-anchor="middle">Claude基盤を介す</text>
<text class="sub s-purple" x="385" y="150" text-anchor="middle">Marukin-Support Project</text>
<text class="sub s-purple" x="385" y="170" text-anchor="middle">曖昧・分析・音声入力</text>
<rect x="270" y="200" width="230" height="86" rx="6" class="b-gray"/>
<text class="title t-gray" x="385" y="226" text-anchor="middle">直接操作</text>
<text class="sub s-gray" x="385" y="246" text-anchor="middle">SF UI / AppSheet</text>
<text class="sub s-gray" x="385" y="266" text-anchor="middle">定型・大量・正確</text>

<rect x="510" y="104" width="130" height="182" rx="6" class="b-blue"/>
<text class="title t-blue" x="575" y="128" text-anchor="middle">Salesforce</text>
<text class="sub s-blue" x="575" y="146" text-anchor="middle">正本(マスタ)</text>
<rect x="524" y="192" width="102" height="82" rx="6" class="b-blue" stroke-dasharray="5 3"/>
<text class="title t-blue" x="575" y="214" text-anchor="middle">Agentforce</text>
<text class="sub s-blue" x="575" y="232" text-anchor="middle">SF内蔵AI</text>
<text class="sub s-blue" x="575" y="250" text-anchor="middle">将来の選択肢</text>

<line class="arr" x1="210" y1="165" x2="264" y2="147" marker-end="url(#arrow)"/>
<line class="arr" x1="210" y1="212" x2="264" y2="243" marker-end="url(#arrow)"/>
<line class="arr" x1="500" y1="148" x2="508" y2="160" marker-end="url(#arrow)"/>
<line class="arr" x1="500" y1="242" x2="508" y2="228" marker-end="url(#arrow)"/>
</svg>
